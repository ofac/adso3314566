<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14-Backgrounds</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        div.box {
            border: 4px solid #fff9;
            border-radius: 8px;
            height: 380px;
            margin: 1rem auto;
            width: 360px;
            &.box1 {
                background-color: #408694;
            }
            &.box2 {
                background-image: url(imgs/pattern.png);
            }
            &.box3 {
                background-image: url(imgs/pattern.png);
                background-repeat: no-repeat;
            }
            &.box4 {
                background-image: url(imgs/pattern.png);
                background-repeat: no-repeat;
                background-position: center;
            }
            &.box5 {
                background-image: url(imgs/pattern.png);
                background-size: 25%;
            }
            &.box6 {
                background-image: url(imgs/pattern.png);
                background-attachment: fixed;
            }
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>14-Backgrounds</h1>
            <ul>
                <li>background-color</li>
                <li>background-image</li>
                <li>background-repeat</li>
                <li>background-position</li>
                <li>background-size</li>
                <li>background-attachment</li>
            </ul>
        </header>
        <section>
            <h3>Background Color</h3>
            <div class="box box1"></div>
            <h3>Background Image</h3>
            <div class="box box2"></div>
            <h3>Background Repeat</h3>
            <div class="box box3"></div>
            <h3>Background Position</h3>
            <div class="box box4"></div>
            <h3>Background Size</h3>
            <div class="box box5"></div>
            <h3>Background Attachment</h3>
            <div class="box box6"></div>

        </section>
    </main>
</body>
</html>
