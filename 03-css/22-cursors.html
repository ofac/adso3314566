<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22-Cursors</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        section div {
            background-color: #0003;
            border: 2px solid #fffc;
            height: 140px;
            margin-block: 0.6rem;
            margin-inline: auto;
            width: 280px;
        }
        div.cursor-move { cursor: move; }
        div.cursor-help { cursor: help; }
        div.cursor-crosshair { cursor: crosshair; }
        div.cursor-image {
            cursor: url(imgs/pointer.png), pointer;
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>22-Cursors</h1>
            <h2>Specifies the mouse cursor to be displayed when pointing over an element.</h2>
        </header>
        <section>
            <h3>Move:</h3>
            <div class="cursor-move"></div>
            <h3>Help:</h3>
            <div class="cursor-help"></div>
            <h3>Crosshair:</h3>
            <div class="cursor-crosshair"></div>
            <h3>Image (Custom):</h3>
            <div class="cursor-image"></div>
        </section>
    </main>
</body>
</html>
