<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26-Border Radius</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        section div {
            background-color: #fff9;
            height: 140px;
            margin-block: 1rem;
            margin-inline: auto;
            width: 140px;
        }
        div.bradius1 { border-radius: 50%;  }
        div.bradius2 { border-radius: 40px 0;  }
        div.bradius3 { border-radius: 140px 0 0 140px;  }
        div.bradius4 { border-radius: 140px 0 140px 140px;  }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>26-Border Radius</h1>
            <h2>Property defines the radius of the element's corners.</h2>
        </header>
        <section>
            <h3>border-radius: 50%</h3>
            <div class="bradius1"></div>
            <h3>border-radius: 40px 0</h3>
            <div class="bradius2"></div>
            <h3>border-radius: 140px 0 0 140px</h3>
            <div class="bradius3"></div>
            <h3>border-radius: 140px 0 140px 140px</h3>
            <div class="bradius4"></div>
        </section>
    </main>
</body>
</html>
