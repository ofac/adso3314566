<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>35-Transformations</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        main section img {
            border-radius: 0;
            border: none;
            display: block;
            margin-block: 1rem;
            margin-inline: auto;
        }
        img.transform1 {
            transform: rotate(90deg);
        }
        img.transform2 {
            transform: scale(0.5);
        }
        img.transform3 {
            transform: TranslateX(-100px);
        }
        img.transform4 {
            transform: skew(30deg);
        }
        img.transform5 {
            transform: rotate(45deg) scale(1.2);
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>35-Transformations</h1>
            <h2>Property lets you rotate, scale, skew, or translate an element.</h2>
        </header>
        <section>
            <h3>Rotate: 90deg</h3>
            <img class="transform1" src="imgs/mario-body.png" width="180px">
            <h3>Scale: 0.5</h3>
            <img class="transform2" src="imgs/mario-body.png" width="180px">
            <h3>TranslateX: -100px</h3>
            <img class="transform3" src="imgs/mario-body.png" width="180px">
            <h3>Skew: 30deg</h3>
            <img class="transform4" src="imgs/mario-body.png" width="180px">
            <h3>Rotate Scale:</h3>
            <img class="transform5" src="imgs/mario-body.png" width="180px">
        </section>
    </main>
</body>
</html>
