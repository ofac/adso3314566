<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18-Typography</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sacramento&display=swap');
        body main section p.color-crimson {
            color: darkorchid;
        }
        .ffamily-sacramento {
            font-family: "Sacramento", cursive;
        }
        body main section p.fsize-4rem {
            font-size: 4rem;
        }
        .fweight-100 {
            font-weight: 100;
        }
        .fweight-400 {
            font-weight: 400;
        }
        .fweight-800 {
            font-weight: 800;
        }
        .fstyle {
            font-style: italic;
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>18-Typography</h1>
            <ul>
                <li>Color</li>
                <li>Family</li>
                <li>Size</li>
                <li>Weight</li>
                <li>Style</li>
            </ul>
        </header>
        <section>
            <h3>Color:</h3>
            <p class="color-crimson">Lorem Ipsum Dolor</p>
            <h3>Font Family:</h3>
            <p class="ffamily-sacramento">Lorem Ipsum Dolor</p>
            <h3>Font Size:</h3>
            <p class="ffamily-sacramento fsize-4rem">Lorem Ipsum</p>
            <h3>Font Weight:</h3>
            <p class="fweight-100">Lorem Ipsum Dolor</p>
            <p class="fweight-400">Lorem Ipsum Dolor</p>
            <p class="fweight-800">Lorem Ipsum Dolor</p>
            <h3>Font Style:</h3>
            <p class="fstyle">Lorem Ipsum Dolor</p>
        </section>
    </main>
</body>
</html>
