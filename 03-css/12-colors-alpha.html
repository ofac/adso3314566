<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-Colors Alpha</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        figure.mario {
            background: url(imgs/mario.png) 
                        no-repeat center /cover;
            border: 4px solid #fff;
            margin: 0 auto;
            padding: 0;
            margin-block: 4rem;
            height: 360px;
            width: 360px;
            div {
                height: calc(360px/3);
                &.box1 {
                    background-color: rgba(255,255,255,0.8);
                }
                &.box2 {
                    background-color: #ffffff77;
                }
                &.box3 {
                    background-color: hsla(0, 100%, 100%, 0.367);
                }
            }
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>12-Colors Alpha</h1>
            <h2>The fourth alpha channel allows you to apply opacity or transparency to the color.</h2>
        </header>
        <section>
            <h3>Example Transparent Colors:</h3>
            <figure class="mario">
                <div class="box1"></div>
                <div class="box2"></div>
                <div class="box3"></div>
            </figure>
        </section>
    </main>
</body>
</html>
