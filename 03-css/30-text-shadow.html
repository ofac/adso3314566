<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Text Shadow</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        body main section p.txt {
            color: #fff;
            text-align: center;
            font-size: 4rem;
            margin: 0;
        }
        p.txt1 {
            font-size: 3rem;
            text-shadow: 0px 2px 6px #fff;
        }
        p.txt2 {
            text-shadow: -4px -4px 8px #fff;
        }
        p.txt3 {
            text-shadow: 1px 0px 1px #aaa,
                         0px 1px 1px #ccc,
                         2px 1px 1px #aaa,
                         1px 2px 1px #ccc,
                         3px 2px 1px #aaa,
                         2px 3px 1px #ccc,
                         4px 3px 1px #aaa,
                         3px 4px 1px #ccc,
                         5px 4px 1px #aaa,
                         4px 5px 1px #ccc,
                         6px 5px 1px #aaa,
                         5px 6px 1px #ccc,
                         7px 6px 1px #aaa;
        }
        p.txt4 {
            letter-spacing: 0.8rem;
            text-shadow:  0px  2px  0px #dfdfdf,
                         -2px  5px  0px #b8b8b8,
                         -4px  8px  0px #979797,
                         -6px  11px 0px #747474,
                         -8px  14px 0px #565656,
                        -10px  17px 0px #343434,
                        -12px  20px 0px #171717,
                        -14px  23px 0px #000000;
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>30-Text Shadow</h1>
            <h2>Adds shadows to text.</h2>
        </header>
        <section>
            <p class="txt txt1">ADSO</p>
            <p class="txt txt2">C.P.I.C</p>
            <p class="txt txt3">SENA</p>
            <p class="txt txt4">Caldas</p>
        </section>
    </main>
</body>
</html>
