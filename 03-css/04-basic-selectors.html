<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04-Basic Selectors</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        /* this selector is merge*/
        section div.rotate {
            background: #d42727;
            color: #fff9;
            margin: 4rem auto;
            padding: 0.4rem;
            text-align: center;
            font-size: 4rem;
            width: 200px;
            transform: rotate(-0.1turn); /* -45deg */
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>04-Basic Selectors</h1>
            <ul>
                <li>Universal (*)</li>
                <li>Type / Tag (p)</li>
                <li>Descending (div p)</li>
                <li>Class (.important)</li>
                <li>ID (#cod389)</li>
                <li>Merge (div#user3 p.title)</li>
            </ul>
        </header>
        <section>
            <div class="rotate">
                SENA
            </div>
        </section>
    </main>
