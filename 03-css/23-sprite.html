<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23-Sprite</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        div#sprite {
            background: url(imgs/run-sprite.png) no-repeat;
            height: 256px;
            margin: 1rem auto;
            width: 256px;
        }
        div#sprite.sp1 { background-position: calc(-256px * 0) 0; }
        div#sprite.sp2 { background-position: calc(-256px * 1) 0; }
        div#sprite.sp3 { background-position: calc(-256px * 2) 0; }
        div#sprite.sp4 { background-position: calc(-256px * 3) 0; }
        div#sprite.sp5 { background-position: calc(-256px * 4) 0; }
        div#sprite.sp6 { background-position: calc(-256px * 5) 0; }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>23-Sprite</h1>
            <h2>An image sprite is a collection of images put into a single image.</h2>
        </header>
        <section>
            <div id="sprite" class="sp1"></div>
        </section>
    </main>
</body>
</html>
