<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23-Sprite</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        div#sprite {
            background: url(imgs/run-sprite.png) no-repeat;
            height: 256px;
            margin: 1rem auto;
            width: 256px;
        }
        div#sprite.sp1 { background-position: calc(-256px * 0) 0; }
        div#sprite.sp2 { background-position: calc(-256px * 1) 0; }
        div#sprite.sp3 { background-position: calc(-256px * 2) 0; }
        div#sprite.sp4 { background-position: calc(-256px * 3) 0; }
        div#sprite.sp5 { background-position: calc(-256px * 4) 0; }
        div#sprite.sp6 { background-position: calc(-256px * 5) 0; }
        div#dino {
            background: url(imgs/dino-sprite.png) no-repeat;
            height: 128px;
            margin: 2rem auto;
            width: 128px;
        }
        div#dino.sp1 { background-position: calc(-128px * 0) 0; }
        div#dino.sp2 { background-position: calc(-128px * 1) 0; }
        div#dino.sp3 { background-position: calc(-128px * 2) 0; }
        div#dino.sp4 { background-position: calc(-128px * 3) 0; }
        div#dino.sp5 { background-position: calc(-128px * 4) 0; }

    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>23-Sprite</h1>
            <h2>An image sprite is a collection of images put into a single image.</h2>
        </header>
        <section>
            <h3>Runner:</h3>
            <div id="sprite" class="sp1"></div>
            <h3>Dino:</h3>
            <div id="dino" class="sp1"></div>
        </section>
    </main>
    <script>
        const sprite     = document.getElementById('sprite')
        const dino       = document.getElementById('dino')
        const numSprite  = 6
        const dinoSprite = 2
        let   count      = 1
        let   countDino  = 1
        setInterval(() => {
            sprite.className = '' 
            sprite.classList.add('sp'+count) 
            if(count == numSprite) count=1
            else count++
        }, 80)
        setInterval(() => {
            dino.className = '' 
            dino.classList.add('sp'+countDino) 
            if(countDino == dinoSprite) countDino=1
            else countDino++
        }, 80)
    </script>
</body>
</html>
