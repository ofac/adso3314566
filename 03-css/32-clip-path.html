<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32-Clip Path</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        div.clip {
            background: url(imgs/pittsburgh.jpg) no-repeat center;
            background-size: cover;
            height: 280px;
            margin-block: 1rem;
            margin-inline: auto;
            transition: all 0.4s ease-in;
            width: 320px;
        }
        div.clip1 {
            clip-path: polygon(50% 0, 50% 0, 100% 100%, 0% 100%);
        }
        div.clip2 {
            clip-path: polygon(20% 0%, 0% 20%, 30% 50%, 0% 80%, 20% 100%, 50% 70%, 80% 100%, 100% 80%, 70% 50%, 100% 20%, 80% 0%, 50% 30%);
        }
        div.clip1:hover {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
        }
        div.clip2:hover {
            clip-path: polygon(20% 0%, 0% 20%, 0 50%, 0% 80%, 20% 100%, 49% 100%, 80% 100%, 100% 80%, 100% 50%, 100% 20%, 80% 0%, 50% 0);
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>32-Clip Path</h1>
            <h2>Property lets you clip an element to a basic shape.</h2>
        </header>
        <section>
            <h3>Example 01:</h3>
            <div class="clip clip1"></div>
            <h3>Example 02:</h3>
            <div class="clip clip2"></div>
        </section>
    </main>
</body>
</html>
