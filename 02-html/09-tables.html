<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09-Tables</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <style>
        section {
            table {
                border-collapse: collapse;
                width: 100%;
                thead, tfoot {
                    th, td {
                        background-color: #000d;
                        border: 1px solid #fff6;
                        color: #fff;
                        text-align: center;
                        padding: 6px;
                    }
                }
                tbody {
                    td {
                        background-color: #0006;
                        padding: 4px;
                        border: 1px solid #fff6;
                    }
                    tr:nth-of-type(even) {
                        td {
                            background-color: #0009;
                        }
                    }
                }
            }
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>09-Tables</h1>
            <h2>Creates tables for data display. </h2>
        </header>
        <section>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>FullName</th>
                        <th>Phone</th>
                        <th>Email</th> 
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Homer Simpson</td>
                        <td>011002001</td>
                        <td>homer@mail.com</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Marge Simpson</td>
                        <td>011002002</td>
                        <td>marge@mail.com</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Barth Simpson</td>
                        <td>011002003</td>
                        <td>barth@mail.com</td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>Liza Simpson</td>
                        <td>011002004</td>
                        <td>liza@mail.com</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="4">
                            Simpson Family
                        </td>
                    </tr>
                </tfoot>
            </table>
        </section>
    </main>
</body>
</html>
