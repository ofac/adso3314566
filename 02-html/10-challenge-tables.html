<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Challenge Tables</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <style>
        table {
            border: 2px solid #fff;
            border-collapse: collapse;
            color: #fff;
            td {
                 border: 2px solid #fff;
                 padding: 0.2rem;
                 text-align: center;
                 height: 40px;
                 width: 40px;
                 &.selected {
                    background-color: #111;
                 }
            }
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>10-Challenge Tables</h1>
            <h2>Practices table creation and structure.</h2>
        </header>
        <section>
                <table>
                    <!-- Fila 1 -->
                    <tr>
                        <td colspan="5"></td>
                        <td class="selected">😎</td>
                        <td colspan="5"></td>
                    </tr>

                    <!-- Fila 2 -->
                    <tr>
                        <td colspan="4"></td>
                        <td class="selected">😎</td>
                        <td rowspan="2" class="selected">😎</td>
                        <td class="selected">😎</td>
                        <td colspan="4"></td>
                    </tr>

                    <!-- Fila 3 -->
                    <tr>
                        <td colspan="3"></td>
                        <td class="selected">😎</td>
                        <td></td>
                        <td class="selected">😎</td>
                        <td colspan="3"></td>
                    </tr>

                    <!-- Fila 4 -->
                    <tr>
                        <td colspan="2"></td>
                        <td class="selected">😎</td>
                        <td colspan="3" class="selected">😎</td>
                        <td class="selected">😎</td>
                        <td colspan="2"></td>
                    </tr>

                    <!-- Fila 5 -->
                    <tr>
                        <td></td>
                        <td class="selected">😎</td>
                        <td colspan="5" class="selected">😎</td>
                        <td class="selected">😎</td>
                        <td></td>
                    </tr>

                    <!-- Fila 6 -->
                    <tr>
                        <td colspan="2"></td>
                        <td class="selected">😎</td>
                        <td colspan="3" class="selected">😎</td>
                        <td class="selected">😎</td>
                        <td colspan="2"></td>
                    </tr>

                    <!-- Fila 7 -->
                    <tr>
                        <td colspan="3"></td>
                        <td class="selected">😎</td>
                        <td></td>
                        <td class="selected">😎</td>
                        <td colspan="3"></td>
                    </tr>

                    <!-- Fila 8 -->
                    <tr>
                        <td colspan="4"></td>
                        <td class="selected">😎</td>
                        <td class="selected">😎</td>
                        <td class="selected">😎</td>
                        <td colspan="4"></td>
                    </tr>

                    <!-- Fila 9 -->
                    <tr>
                        <td colspan="5"></td>
                        <td class="selected">😎</td>
                        <td colspan="5"></td>
                    </tr>
                    </table>
        </section>
    </main>
</body>
</html>
